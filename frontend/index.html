<!DOCTYPE html>
<html lang="en">
<head>

    <title>Redirecting...</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
        }
        .container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .message {
            text-align: center;
            background-color: #fff;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }
        .message h1 {
            color: #333;
            margin-top: 0;
        }
        .message p {
            color: #666;
            margin-bottom: 0;
        }
        .message a {
            color: #2e7d32;
            text-decoration: none;
            font-weight: bold;
        }
        .message a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="message">
            <h1>Redirecting...</h1>
            <p>Please wait while we redirect you to the Mango Market platform.</p>
            <p>If you are not redirected automatically, <a href="html/home.html">click here</a>.</p>
